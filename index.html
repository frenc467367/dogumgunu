<style>
  /* 1. Tüm sayfanın arka planını karanlık yap */
  body {
    background-color: #121212; /* Tam siyah yerine göze daha hoş gelen koyu gri */
    color: white; /* Metinler okunabilir olsun diye beyaz yapıldı */
    font-family: Arial, sans-serif; /* Temel yazı tipi */
    overflow-x: hidden; /* Kalpler sağa kaymasın */
    position: relative;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  /* 2. Kalp Yağmuru Animasyonu İçin CSS */
  .heart-container {
    position: fixed;
    top: -50px; /* Kalpler ekranın dışından başlasın */
    width: 100%;
    height: 100vh;
    pointer-events: none; /* Kalplerin üzerine tıklanamasın, siteyi engellemesin */
    z-index: -1; /* Kalpler metinlerin ve resimlerin arkasında kalsın */
  }

  .heart {
    position: absolute;
    color: #ff4d4d; /* Kalplerin kırmızı rengi */
    font-size: 24px; /* Kalplerin boyutu */
    animation: fall linear infinite; /* Animasyon ayarları */
    opacity: 0;
  }

  @keyframes fall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 1; /* Kalp görünüre gelsin */
    }
    90% {
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) rotate(360deg); /* Ekranın altına kadar gitsin */
      opacity: 0; /* Ve kaybolsun */
    }
  }

  /* Farklı zamanlarda ve hızlarda düşmeleri için varyasyonlar (Bu kısmı JavaScript ile oluşturacağız) */
</style>

<!-- 3. Kalp Yağmuru İçin Gerekli HTML ve JavaScript Bloğu (Bunu da kodun en sonuna, </body>'den hemen önce yapıştırabilirsin) -->
<script>
  // Kalpleri oluşturacak ve animasyonu başlatacak fonksiyon
  function createHearts() {
    const container = document.body;
    const heartCount = 30; // Ekranda aynı anda kaç kalp olsun? (Performans için ideal sayı)

    for (let i = 0; i < heartCount; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️'; // Kalp sembolü (Dilersen 💖 gibi başka bir şeyle de değiştirebilirsin)

      // Rastgele başlangıç pozisyonu (Soldan sağa)
      heart.style.left = Math.random() * 100 + 'vw';

      // Rastgele gecikme süresi (Hepsi aynı anda düşmesin)
      heart.style.animationDelay = Math.random() * 5 + 's';

      // Rastgele düşme hızı (Bazıları daha hızlı, bazıları daha yavaş)
      heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // 4s ile 7s arasında

      container.appendChild(heart);
    }
  }

  // Sayfa yüklendiğinde kalpleri oluştur
  window.addEventListener('load', createHearts);
</script>
