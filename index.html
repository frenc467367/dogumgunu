<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğum Günün Kutlu Olsun ❤️</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial,sans-serif;
overflow:hidden;
}

h1{
font-size:55px;
color:white;
text-align:center;
text-shadow:2px 2px 10px rgba(0,0,0,.3);
animation:buyu 2s infinite alternate;
}

@keyframes buyu{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.kalp{
position:absolute;
color:red;
font-size:25px;
animation:yukari 6s linear infinite;
}

@keyframes yukari{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<h1>🎉 Doğum Günün Kutlu Olsun! ❤️🎂</h1>

<script>
function kalpOlustur(){
let kalp=document.createElement("div");
kalp.className="kalp";
kalp.innerHTML="❤️";
kalp.style.left=Math.random()*100+"vw";
kalp.style.fontSize=(20+Math.random()*30)+"px";
kalp.style.animationDuration=(3+Math.random()*4)+"s";
document.body.appendChild(kalp);

setTimeout(()=>{
kalp.remove();
},7000);
}

setInterval(kalpOlustur,300);
</script>

</body>
</html>
